<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="記帳本">
  <meta name="theme-color" content="#4A90D9">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>記帳本</title>
</head>
<body>

  <!-- 畫面 1：首頁 -->
  <section id="screen-home" class="screen active">
    <div class="home-container">
      <h1 class="app-title">記帳本</h1>
      <button id="btn-mic" class="mic-button" aria-label="語音記帳">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <p class="mic-hint">點擊說「記帳」開始</p>
      <button id="btn-new-entry" class="primary-button">新增記帳</button>
    </div>
  </section>

  <!-- 畫面 2：選擇類型 -->
  <section id="screen-type" class="screen">
    <header class="screen-header">
      <button class="back-button" data-target="screen-home">&larr;</button>
      <h2>選擇類型</h2>
    </header>
    <div class="type-grid">
      <button class="type-button type-expense" data-type="支出">支出</button>
      <button class="type-button type-income" data-type="收入">收入</button>
      <button class="type-button type-transfer" data-type="轉帳">轉帳</button>
      <button class="type-button type-withdraw" data-type="提款">提款</button>
      <button class="type-button type-deposit" data-type="存款">存款</button>
      <button class="type-button type-exchange" data-type="換匯">換匯</button>
    </div>
  </section>

  <!-- 畫面 3：輸入金額 -->
  <section id="screen-amount" class="screen">
    <header class="screen-header">
      <button class="back-button" data-target="screen-type">&larr;</button>
      <h2 id="amount-title">輸入金額</h2>
    </header>
    <div class="amount-display">
      <span class="currency-symbol">$</span>
      <span id="amount-value">0</span>
    </div>
    <div class="keypad">
      <button class="key-button" data-key="1">1</button>
      <button class="key-button" data-key="2">2</button>
      <button class="key-button" data-key="3">3</button>
      <button class="key-button key-delete" data-key="delete">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/>
        </svg>
      </button>
      <button class="key-button" data-key="4">4</button>
      <button class="key-button" data-key="5">5</button>
      <button class="key-button" data-key="6">6</button>
      <button class="key-button" data-key="0">0</button>
      <button class="key-button" data-key="7">7</button>
      <button class="key-button" data-key="8">8</button>
      <button class="key-button" data-key="9">9</button>
      <button class="key-button" data-key=".">.</button>
    </div>
    <button id="btn-next-category" class="primary-button">下一步</button>
  </section>

  <!-- 畫面 4：選擇類別 -->
  <section id="screen-category" class="screen">
    <header class="screen-header">
      <button class="back-button" data-target="screen-amount">&larr;</button>
      <h2 id="category-title">選擇類別</h2>
    </header>
    <div id="category-grid" class="category-grid">
      <!-- 動態產生 -->
    </div>
  </section>

  <!-- 畫面 5：確認送出 -->
  <section id="screen-confirm" class="screen">
    <header class="screen-header">
      <button class="back-button" data-target="screen-category">&larr;</button>
      <h2>確認送出</h2>
    </header>
    <div class="confirm-card">
      <div class="confirm-row">
        <span class="confirm-label">類型</span>
        <span id="confirm-type" class="confirm-value"></span>
      </div>
      <div class="confirm-row">
        <span class="confirm-label">金額</span>
        <span id="confirm-amount" class="confirm-value"></span>
      </div>
      <div class="confirm-row">
        <span class="confirm-label">類別</span>
        <span id="confirm-category" class="confirm-value"></span>
      </div>
      <div class="confirm-row">
        <span class="confirm-label">日期</span>
        <span id="confirm-date" class="confirm-value"></span>
      </div>
      <div class="confirm-row">
        <span class="confirm-label">時間</span>
        <span id="confirm-time" class="confirm-value"></span>
      </div>
    </div>
    <button id="btn-submit" class="primary-button submit-button">確認送出</button>
    <button id="btn-back-edit" class="secondary-button">返回修改</button>
  </section>

  <!-- 成功提示 -->
  <div id="success-overlay" class="overlay hidden">
    <div class="success-content">
      <svg viewBox="0 0 24 24" width="64" height="64" fill="#4CAF50">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <p>記帳成功！</p>
    </div>
  </div>

  <!-- 訊息提示 -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
